     <head>

<body>

	<div class="container">
		<p>position: static</p>
		<div class="static-child">
	</div>
	<div class="container">
		<p>position: relative</p>
		<div class="relative-child">
	    </div>
	</div>	
    <div class="container">
    	<p>position: abolute</p>
    	<div class="absolute-child">
    	</div>	
	</div>
	<div class="container relative-parent">
		<p>position: abolute with parent relative</p>
		<div class="container"
	</div>
	</div>
	<div class="container">

		<div class="sticky-child">
		</div>

	</div>
